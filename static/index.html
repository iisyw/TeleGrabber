<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeleGrabber</title>
<link rel="icon" type="image/png" href="/static/favicon.png">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="sidebar-header">
      <svg class="brand-icon" viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.19L7.74 13.3 3.64 12c-.88-.25-.89-.86.2-1.3l15.43-5.95c.74-.28 1.38.18 1.11 1.3l-2.62 12.34c-.19.9-.74 1.12-1.5.7l-4.13-3.05-1.99 1.93c-.23.23-.42.43-.83.43z"/></svg>
      <span>TeleGrabber</span>
    </div>
    <div id="sourceTypeTabs" class="source-type-tabs">
      <button class="source-type-tab active" data-type="">全部</button>
      <button class="source-type-tab" data-type="channel">频道</button>
      <button class="source-type-tab" data-type="bot">机器人</button>
      <button class="source-type-tab" data-type="group">群组</button>
      <button class="source-type-tab" data-type="private_user">用户</button>
    </div>
    <div id="sourceList" class="source-list"></div>
  </aside>
  <main id="mainArea">
    <div class="top-bar">
      <div class="chat-info">
        <div class="chat-avatar badge all" id="chatAvatar">全部</div>
        <div>
          <div class="chat-name" id="chatName">全部消息</div>
          <div class="chat-count" id="chatCount"></div>
        </div>
      </div>
      <div class="top-bar-actions">
        <div class="search-box" id="searchBox">
          <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          <input type="text" id="searchInput" placeholder="搜索媒体...">
          <button id="searchClearBtn" class="search-clear" aria-label="清除搜索">&times;</button>
        </div>
        <button id="sortToggle" class="sort-toggle" title="切换排序" style="background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px 6px;font-size:11px;border-radius:4px;white-space:nowrap;">消息时间</button>
      </div>
    </div>
    <div id="chatFeed" class="chat-feed">
      <div id="feedSentinel" class="feed-sentinel"></div>
      <div class="loader-container"><div class="loader"></div></div>
    </div>
  </main>
</div>

<div id="modal" class="modal">
  <div class="modal-body">
    <div class="modal-left">
      <button class="modal-close" id="modalClose">&times;</button>
      <button class="modal-nav prev" id="modalPrev">‹</button>
      <button class="modal-nav next" id="modalNext">›</button>
      <div class="modal-counter" id="modalCount"></div>
      <div class="modal-media" id="modalMedia"></div>
    </div>
    <div class="modal-right">
      <div class="modal-caption" id="modalCaption"></div>
      <div class="modal-meta" id="modalMeta"></div>
      <div class="modal-actions">
        <button id="modalDeleteBtn" class="btn btn-danger">🗑️ 删除</button>
      </div>
    </div>
  </div>
</div>

<div id="confirmDialog" class="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-title" id="confirmTitle">确认操作</div>
    <div class="confirm-message" id="confirmMessage"></div>
    <div class="confirm-actions">
      <button id="confirmCancel" class="btn btn-cancel">取消</button>
      <button id="confirmOk" class="btn btn-danger">确认</button>
    </div>
  </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script src="/static/app.js"></script>
</body>
</html>
